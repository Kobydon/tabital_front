<!-- Account Setup -->
<div class="form-section">
  <h3 class="section-title">
    <span class="section-icon">🔐</span>
    Account Security
  </h3>
  <div class="form-grid">
    <div class="form-field">
      <label>Create Password *</label>
      <input formControlName="password" type="password" placeholder="Minimum 6 characters">
      <small class="error-text" *ngIf="customerForm.get('password')?.invalid && customerForm.get('password')?.touched">
        Password is required (minimum 6 characters)
      </small>
    </div>

    <div class="form-field">
      <label>Confirm Password *</label>
      <input formControlName="confirmPassword" type="password" placeholder="Confirm your password">
      <small class="error-text" *ngIf="customerForm.get('confirmPassword')?.invalid && customerForm.get('confirmPassword')?.touched">
        Please confirm your password
      </small>
      <small class="error-text" *ngIf="customerForm.errors?.['passwordMismatch'] && customerForm.get('confirmPassword')?.touched">
        ⚠️ Passwords do not match
      </small>
    </div>
  </div>
</div>
